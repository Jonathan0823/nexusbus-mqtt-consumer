# Device Profile Registry
# Maps raw Modbus register values to semantic metrics

profiles:
  power_meter_9:
    match:
      register_type: "input"
      address: 0
      count: 9

    mapping:
      - index: 0
        key: "voltage"
        type: "uint16"
        multiplier: 0.1
        unit: "V"

      - index: 1
        key: "current"
        type: "uint16"
        multiplier: 0.001
        unit: "A"

      - index: 3
        key: "power"
        type: "uint16"
        multiplier: 0.1
        unit: "W"

      - index: 5
        key: "energy"
        type: "uint16"
        multiplier: 0.001
        unit: "kWh"

      - index: 7
        key: "frequency"
        type: "uint16"
        multiplier: 0.1
        unit: "Hz"

      - index: 8
        key: "power_factor"
        type: "uint16"
        multiplier: 0.01
        unit: "PF"

  environmental_3:
    match:
      register_type: "holding"
      address: 0
      count: 3
      location: "assembling-lithium"

    mapping:
      - index: 0
        key: "temperature"
        type: "uint16"
        multiplier: 0.1
        unit: "°C"

      - index: 1
        key: "humidity"
        type: "uint16"
        multiplier: 0.1
        unit: "%RH"

      - index: 2
        key: "dust"
        type: "uint16"
        multiplier: 1
        unit: "µg/m³"
